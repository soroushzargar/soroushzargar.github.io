<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
<script src="assets/site.js"></script>
<script>
  const SVG_PAPER  = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
  const SVG_POSTER = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>`;
  const SVG_TALK   = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;

  const id = new URLSearchParams(location.search).get('id');

  fetch('data/publications.json')
    .then(r => r.json())
    .then(pubs => {
      const pub = pubs.find(p => p.id === id);
      if (!pub) {
        document.getElementById('pub-title').textContent = 'Publication not found.';
        return;
      }

      document.title = `${pub.title} — Soroush H. Zargarbashi`;

      document.getElementById('pub-title').textContent = pub.title;
      document.getElementById('pub-authors').innerHTML = pub.authorsHtml;
      document.getElementById('pub-venue').textContent = pub.venue;

      document.getElementById('pub-tags').innerHTML =
        pub.tags.map(t => `<span class="tag">${t}</span>`).join('');

      const lnk = pub.links || {};
      const btn = (url, svg, label) => {
        const inactive = !url ? ' pub-detail-link--inactive' : '';
        const attrs = url ? `href="${url}" target="_blank" rel="noopener"` : '';
        return `<a ${attrs} class="pub-detail-link${inactive}">${svg} ${label}</a>`;
      };
      document.getElementById('pub-links').innerHTML =
        btn(lnk.paper,  SVG_PAPER,  'Paper')  +
        btn(lnk.poster, SVG_POSTER, 'Poster') +
        btn(lnk.talk,   SVG_TALK,   'Talk');

      const abstractEl = document.getElementById('pub-abstract');
      abstractEl.innerHTML = marked.parse(pub.abstract || '');
      renderMathInElement(abstractEl, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$',  right: '$',  display: false }
        ],
        throwOnError: false
      });
    });
</script>
</body>
